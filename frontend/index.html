<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adrestalk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- display=block keeps icons invisible until the font loads instead of showing raw text names -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-secondary-fixed": "#1a1c1c",
            "inverse-surface": "#2f3131",
            "tertiary-fixed": "#5e5e5e",
            "on-surface-variant": "#474747",
            "error-container": "#ffdad6",
            "secondary-container": "#d4d4d4",
            "surface-variant": "#e2e2e2",
            "surface-container-low": "#f3f3f4",
            "surface-container-highest": "#e2e2e2",
            "on-tertiary-fixed": "#ffffff",
            "on-background": "#1a1c1c",
            "primary-container": "#3b3b3b",
            "surface-bright": "#f9f9f9",
            "primary-fixed-dim": "#474747",
            "surface-tint": "#5e5e5e",
            "on-tertiary-container": "#ffffff",
            "surface-container": "#eeeeee",
            "tertiary-fixed-dim": "#464747",
            "on-error-container": "#410002",
            "outline": "#777777",
            "surface-container-lowest": "#ffffff",
            "tertiary": "#3b3b3c",
            "on-primary-container": "#ffffff",
            "surface-dim": "#dadada",
            "surface-container-high": "#e8e8e8",
            "surface": "#f9f9f9",
            "inverse-on-surface": "#f0f1f1",
            "on-secondary-fixed-variant": "#3a3c3c",
            "on-primary": "#e2e2e2",
            "on-tertiary-fixed-variant": "#e4e2e2",
            "on-surface": "#1a1c1c",
            "error": "#ba1a1a",
            "background": "#f9f9f9",
            "on-error": "#ffffff",
            "primary": "#000000",
            "on-secondary": "#ffffff",
            "on-primary-fixed-variant": "#e2e2e2",
            "on-secondary-container": "#1a1c1c",
            "inverse-primary": "#c6c6c6",
            "primary-fixed": "#5e5e5e",
            "secondary": "#5d5f5f",
            "tertiary-container": "#747474",
            "outline-variant": "#c6c6c6",
            "on-tertiary": "#e4e2e2",
            "secondary-fixed": "#c6c6c7",
            "on-primary-fixed": "#ffffff",
            "secondary-fixed-dim": "#aaabab"
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          fontFamily: {
            "headline": ["Manrope", "sans-serif"],
            "body": ["Inter", "sans-serif"],
            "label": ["Inter", "sans-serif"]
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="style.css">
  <!-- Runs synchronously before first paint: hide auth if already logged in -->
  <script>if(localStorage.getItem('authToken')){document.documentElement.classList.add('is-authed');}</script>
</head>
<body class="bg-background text-on-surface font-body antialiased">

<!-- ═══════════════════════════════════════════════════
     AUTH CONTAINER  (login / register)
════════════════════════════════════════════════════ -->
<div id="auth-container" class="min-h-screen flex items-center justify-center p-4">

  <!-- Login View -->
  <section id="login-view" class="bg-surface-container-lowest p-10 lg:p-14 rounded-xl ambient-shadow w-full max-w-[480px]">
    <div class="mb-12">
      <h2 class="font-headline text-3xl font-bold text-primary mb-2">Sign In</h2>
      <p class="font-label text-sm text-on-surface-variant uppercase tracking-widest">Access your workspace</p>
    </div>
    <form id="login-form" class="flex flex-col gap-8">
      <div class="flex flex-col gap-6">
        <div>
          <label class="block font-label text-xs uppercase tracking-widest text-on-surface-variant mb-2" for="login-username">Username</label>
          <input
            id="login-username"
            type="text"
            placeholder="your_username"
            autocomplete="username"
            class="w-full bg-surface-container-lowest text-on-surface border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 px-0 py-3 font-body text-base transition-colors placeholder:text-outline"
          >
        </div>
        <div>
          <label class="block font-label text-xs uppercase tracking-widest text-on-surface-variant mb-2" for="login-password">Password</label>
          <input
            id="login-password"
            type="password"
            placeholder="••••••••"
            autocomplete="current-password"
            class="w-full bg-surface-container-lowest text-on-surface border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 px-0 py-3 font-body text-base transition-colors placeholder:text-outline"
          >
        </div>
      </div>
      <p id="login-error" class="text-error text-sm" style="display:none;min-height:1.2em;"></p>
      <div class="flex flex-col gap-4 pt-2">
        <button
          type="submit"
          class="w-full bg-primary text-on-primary font-headline font-bold text-lg py-4 px-6 rounded-lg hover:bg-primary-container transition-colors ambient-shadow flex items-center justify-center gap-2"
        >
          Login
          <span class="material-symbols-outlined text-xl">arrow_forward</span>
        </button>
        <button
          id="show-register"
          type="button"
          class="w-full bg-transparent ghost-border text-primary font-headline font-semibold text-lg py-4 px-6 rounded-lg hover:bg-surface-container-low transition-colors"
        >
          Create Account
        </button>
      </div>
    </form>
  </section>

  <!-- Register View -->
  <section id="register-view" style="display:none;" class="bg-surface-container-lowest p-10 lg:p-14 rounded-xl ambient-shadow w-full max-w-[480px]">
    <div class="mb-12">
      <h2 class="font-headline text-3xl font-bold text-primary mb-2">Create Account</h2>
      <p class="font-label text-sm text-on-surface-variant uppercase tracking-widest">Join your workspace</p>
    </div>
    <form id="register-form" class="flex flex-col gap-8">
      <div class="flex flex-col gap-6">
        <div>
          <label class="block font-label text-xs uppercase tracking-widest text-on-surface-variant mb-2" for="register-username">Username</label>
          <input
            id="register-username"
            type="text"
            placeholder="your_username"
            autocomplete="username"
            class="w-full bg-surface-container-lowest text-on-surface border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 px-0 py-3 font-body text-base transition-colors placeholder:text-outline"
          >
        </div>
        <div>
          <label class="block font-label text-xs uppercase tracking-widest text-on-surface-variant mb-2" for="register-password">Password</label>
          <input
            id="register-password"
            type="password"
            placeholder="min. 8 characters"
            autocomplete="new-password"
            minlength="8"
            class="w-full bg-surface-container-lowest text-on-surface border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 px-0 py-3 font-body text-base transition-colors placeholder:text-outline"
          >
        </div>
        <div>
          <label class="block font-label text-xs uppercase tracking-widest text-on-surface-variant mb-2" for="register-confirm-password">Confirm Password</label>
          <input
            id="register-confirm-password"
            type="password"
            placeholder="••••••••"
            autocomplete="new-password"
            minlength="8"
            class="w-full bg-surface-container-lowest text-on-surface border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 px-0 py-3 font-body text-base transition-colors placeholder:text-outline"
          >
        </div>
      </div>
      <p id="register-error" class="text-error text-sm" style="display:none;min-height:1.2em;"></p>
      <p id="register-success" class="text-sm" style="display:none;min-height:1.2em;color:#2ecc71;"></p>
      <div class="flex flex-col gap-4 pt-2">
        <button
          type="submit"
          class="w-full bg-primary text-on-primary font-headline font-bold text-lg py-4 px-6 rounded-lg hover:bg-primary-container transition-colors ambient-shadow flex items-center justify-center gap-2"
        >
          Register
          <span class="material-symbols-outlined text-xl">arrow_forward</span>
        </button>
        <button
          id="show-login"
          type="button"
          class="w-full bg-transparent ghost-border text-primary font-headline font-semibold text-lg py-4 px-6 rounded-lg hover:bg-surface-container-low transition-colors"
        >
          Already have an account?
        </button>
      </div>
    </form>
  </section>

</div><!-- /auth-container -->

<!-- ═══════════════════════════════════════════════════
     APP CONTAINER  (chats list + chat view)
════════════════════════════════════════════════════ -->
<div id="app-container" style="display:none;" class="h-screen overflow-hidden flex">

  <!-- ── Sidebar ── -->
  <nav class="hidden md:flex bg-zinc-50 font-headline uppercase tracking-widest text-[10px] h-screen w-64 border-r border-zinc-100 flex-col py-8 px-4 gap-4 shrink-0 z-40">
    <!-- Branding -->
    <div class="px-4 mb-6">
      <h1 class="font-black text-lg text-black tracking-tighter normal-case">ADRESTALK</h1>
      <p class="text-[10px] text-on-surface-variant normal-case mt-1">
        Logged in as: <span id="logged-in-username" class="font-semibold text-primary"></span>
      </p>
    </div>

    <!-- New conversation -->
    <button
      id="new-chat-btn"
      class="bg-primary text-on-primary font-body tracking-normal uppercase text-xs font-semibold rounded-md py-4 px-4 mx-2 hover:opacity-90 transition-opacity flex items-center justify-center gap-2 ambient-shadow"
    >
      <span class="material-symbols-outlined text-[18px]">add</span>
      NEW CONVERSATION
    </button>

    <!-- Nav links -->
    <div class="flex flex-col gap-1 mt-2 flex-grow">
      <button
        id="nav-messages-btn"
        class="flex items-center gap-4 px-4 py-3 text-black font-bold rounded-md hover:bg-white transition-all"
      >
        <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">chat_bubble</span>
        <span>Messages</span>
      </button>
    </div>

    <!-- Logout -->
    <div class="mt-auto px-2">
      <button
        id="logout-button"
        class="w-full flex items-center gap-4 px-4 py-3 text-zinc-400 hover:text-black transition-all"
      >
        <span class="material-symbols-outlined">logout</span>
        <span class="font-bold">LOGOUT</span>
      </button>
    </div>
  </nav>

  <!-- ── Main content ── -->
  <main class="flex-1 flex flex-col h-screen overflow-hidden bg-background">

    <!-- ┌─────────────────────────────────────────┐
         │  CHATS LIST VIEW                        │
         └─────────────────────────────────────────┘ -->
    <div id="chats-view" class="flex flex-col h-full">

      <!-- Mobile top bar -->
      <header class="md:hidden flex justify-between items-center px-8 h-20 bg-white/80 backdrop-blur-xl border-b border-surface-container shrink-0">
        <div class="font-headline font-black text-xl text-black tracking-tighter uppercase">ADRESTALK</div>
        <div class="flex items-center gap-4 text-zinc-500">
          <button id="mobile-new-chat-btn" class="hover:text-black transition-colors">
            <span class="material-symbols-outlined">add_comment</span>
          </button>
          <button id="mobile-logout-btn" class="hover:text-black transition-colors">
            <span class="material-symbols-outlined">logout</span>
          </button>
        </div>
      </header>

      <!-- Scrollable body -->
      <div class="flex-1 overflow-y-auto w-full max-w-5xl mx-auto px-6 md:px-12 py-8 md:py-16">

        <!-- Search bar -->
        <div class="mb-16 w-full md:w-2/5">
          <div class="relative group">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors select-none">search</span>
            <input
              id="search-username"
              type="text"
              placeholder="Search or start a conversation..."
              class="w-full bg-surface-container-lowest text-primary placeholder:text-outline border-none focus:ring-0 focus:border-b-2 focus:border-primary pl-12 pr-4 py-4 rounded-sm transition-all text-sm font-body outline-none"
              style="box-shadow:0px 4px 12px rgba(26,28,28,0.03);"
            >
            <div class="absolute inset-0 border border-outline-variant opacity-15 pointer-events-none rounded-sm"></div>
          </div>
          <p id="search-error" class="text-error text-xs mt-2" style="display:none;min-height:1em;"></p>
          <p id="search-info" class="text-on-surface-variant text-xs mt-2" style="display:none;min-height:1em;"></p>
        </div>

        <!-- Chat list -->
        <div class="flex flex-col gap-4">
          <ul id="chat-list" class="flex flex-col gap-4 list-none p-0 m-0"></ul>
          <p id="chats-error" class="text-error text-sm" style="display:none;"></p>
        </div>

      </div>
    </div><!-- /chats-view -->

    <!-- ┌─────────────────────────────────────────┐
         │  CHAT VIEW  (messages)                  │
         └─────────────────────────────────────────┘ -->
    <div id="chat-view" style="display:none;" class="flex flex-col h-full">

      <!-- Chat header -->
      <header class="shrink-0 flex items-center px-8 h-20 bg-white/80 backdrop-blur-xl border-b border-surface-container">
        <div class="flex items-center gap-4">
          <button id="back-to-chats" class="text-primary hover:opacity-70 transition-opacity">
            <span class="material-symbols-outlined">arrow_back</span>
          </button>
          <h2 id="current-chat-name" class="font-headline font-bold text-lg text-primary tracking-tight"></h2>
        </div>
      </header>

      <!-- Messages -->
      <div
        id="messages-container"
        class="flex-1 overflow-y-auto px-6 md:px-12 py-8 flex flex-col gap-4 bg-surface-container-low"
      >
        <p id="no-chat-selected" class="m-auto text-on-surface-variant text-sm text-center">
          Select a chat to start messaging.
        </p>
      </div>

      <!-- Message input -->
      <div id="message-input-container" class="shrink-0 bg-surface/90 backdrop-blur-md px-6 md:px-12 pt-3 pb-5 flex flex-col gap-2 border-t border-surface-container">
        <p id="message-error" class="text-error text-xs" style="display:none;"></p>
        <form id="message-form" class="flex items-end gap-4 w-full">
          <div class="flex-1 relative">
            <textarea
              id="message-input"
              placeholder="Type a message..."
              rows="1"
              autocomplete="off"
              class="w-full bg-surface-container-lowest text-on-surface placeholder:text-outline font-body text-base rounded-md px-4 py-4 resize-none focus:outline-none focus:ring-0 border-0 border-b-2 border-transparent focus:border-primary transition-all shadow-sm max-h-32 overflow-y-auto"
              style="min-height:56px;"
            ></textarea>
          </div>
          <button
            type="submit"
            class="bg-primary text-on-primary h-14 w-14 rounded-md flex items-center justify-center hover:opacity-90 transition-opacity shrink-0 ambient-shadow"
          >
            <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">send</span>
          </button>
        </form>
      </div>

    </div><!-- /chat-view -->

  </main>
</div><!-- /app-container -->

<!-- Logout screen — shown briefly during sign-out -->
<div id="logout-screen" style="display:none;" class="fixed inset-0 bg-background flex-col items-center justify-center z-50 gap-6">
  <h1 class="font-headline font-black text-4xl text-primary tracking-tighter">ADRESTALK</h1>
  <p class="font-label text-xs text-on-surface-variant uppercase tracking-widest">Signing out…</p>
</div>

<script src="script.js"></script>
</body>
</html>
